<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>System Trace Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#030303;
  color:#00ff88;
  font-family:"Share Tech Mono", monospace;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

.scanline{
  position:fixed;
  inset:0;
  background:linear-gradient(
    transparent 50%,
    rgba(0,255,120,0.03) 50%
  );
  background-size:100% 4px;
  pointer-events:none;
  animation:scan 8s linear infinite;
}

@keyframes scan{
  from{transform:translateY(0)}
  to{transform:translateY(10px)}
}

.glow{
  text-shadow:
    0 0 5px #00ff88,
    0 0 10px #00ff88,
    0 0 20px #00ff88;
}

.container{
  width:100%;
  height:100vh;
  padding:30px;
  overflow:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
  border-bottom:1px solid rgba(0,255,120,0.3);
  padding-bottom:10px;
}

.warning{
  color:#ff3b3b;
  text-shadow:0 0 10px red;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.4}
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(0,255,120,0.3);
  border-radius:12px;
  padding:18px;
  backdrop-filter:blur(6px);
  box-shadow:0 0 15px rgba(0,255,120,0.1);
}

.card h2{
  margin-bottom:15px;
  color:#00ffaa;
  font-size:20px;
}

.line{
  margin:8px 0;
  word-break:break-all;
}

.label{
  color:#6dffb4;
}

.value{
  color:#ffffff;
}

.fake-progress{
  width:100%;
  height:18px;
  border:1px solid #00ff88;
  margin-top:15px;
  overflow:hidden;
}

.fake-progress div{
  width:0%;
  height:100%;
  background:#00ff88;
  animation:load 8s linear forwards;
}

@keyframes load{
  from{width:0%}
  to{width:100%}
}

.log{
  height:250px;
  overflow:hidden;
  font-size:14px;
}

.log div{
  margin-bottom:6px;
  opacity:0;
  animation:appear 0.3s forwards;
}

@keyframes appear{
  to{opacity:1}
}

.center-alert{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:42px;
  color:red;
  text-shadow:0 0 20px red;
  opacity:0;
  pointer-events:none;
  animation:flash 3s ease forwards;
  animation-delay:8s;
}

@keyframes flash{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  80%{opacity:1}
  100%{opacity:0}
}

</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="scanline"></div>

<div class="container">
  <div class="topbar">
    <div class="glow">SYSTEM TRACE ANALYZER v4.2</div>
    <div class="warning">LIVE SESSION DETECTED</div>
  </div>

  <div class="grid">

    <div class="card">
      <h2>Client Information</h2>
      <div class="line"><span class="label">User Agent:</span> <span class="value" id="ua"></span></div>
      <div class="line"><span class="label">Language:</span> <span class="value" id="lang"></span></div>
      <div class="line"><span class="label">Platform:</span> <span class="value" id="platform"></span></div>
      <div class="line"><span class="label">CPU Threads:</span> <span class="value" id="cpu"></span></div>
      <div class="line"><span class="label">RAM:</span> <span class="value" id="ram"></span> GB</div>
      <div class="line"><span class="label">Resolution:</span> <span class="value" id="res"></span></div>
      <div class="line"><span class="label">Timezone:</span> <span class="value" id="tz"></span></div>
      <div class="line"><span class="label">Battery:</span> <span class="value" id="battery"></span></div>
    </div>

    <div class="card">
      <h2>Location Simulation</h2>
      <div class="line"><span class="label">IP Address:</span> <span class="value" id="ip">Resolving...</span></div>
      <div class="line"><span class="label">Region:</span> <span class="value" id="region">Unknown</span></div>
      <div class="line"><span class="label">ISP:</span> <span class="value" id="isp">Unknown</span></div>

      <div class="fake-progress">
        <div></div>
      </div>
    </div>

    <div class="card">
      <h2>Live Terminal Feed</h2>
      <div class="log" id="log"></div>
    </div>

  </div>
</div>

<div class="center-alert">TRACE COMPLETE</div>

<script>
const logs = [
  "Initializing network scanner...",
  "Establishing remote session...",
  "Collecting browser fingerprint...",
  "Inspecting rendering engine...",
  "Analyzing hardware profile...",
  "Reading timezone configuration...",
  "Building session map...",
  "Resolving network route...",
  "Simulating trace sequence...",
  "Generating visualization output...",
  "Finalizing analysis..."
];

const logBox = document.getElementById("log");

logs.forEach((text,index)=>{
  setTimeout(()=>{
    const el = document.createElement("div");
    el.textContent = "> " + text;
    el.style.animationDelay = "0s";
    logBox.appendChild(el);
  },index*700);
});

function set(id,val){
  document.getElementById(id).textContent = val;
}

set("ua", navigator.userAgent);
set("lang", navigator.language);
set("platform", navigator.platform || "Unknown");
set("cpu", navigator.hardwareConcurrency || "Unknown");
set("ram", navigator.deviceMemory || "Unknown");
set("res", `${screen.width} x ${screen.height}`);
set("tz", Intl.DateTimeFormat().resolvedOptions().timeZone);

if(navigator.getBattery){
  navigator.getBattery().then(b=>{
    set("battery", Math.floor(b.level*100)+"%");
  });
}else{
  set("battery", "Unavailable");
}

fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(data=>{
  set("ip", data.ip || "Unavailable");
  set("region", `${data.city}, ${data.region}, ${data.country_name}`);
  set("isp", data.org || "Unknown");
})
.catch(()=>{
  set("ip", "Unavailable");
});

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%^&*";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];

for(let i=0;i<columns;i++){
  drops[i]=1;
}

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i]=0;
    }

    drops[i]++;
  }
}

setInterval(draw,35);

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
